name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Validate and build extensions
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $profiles = Get-Content -Raw src/extensions.json | ConvertFrom-Json
          foreach ($extension in $profiles.extensions) {
            Write-Host "Validating $($extension.key)..."
            ./scripts/validate-extension.ps1 -Extension $extension.key -Mode Ci

            Write-Host "Restoring $($extension.project)..."
            dotnet restore $extension.project

            Write-Host "Building $($extension.project)..."
            dotnet build $extension.project -c Release --no-restore
          }
